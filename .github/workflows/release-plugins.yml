# @file release-plugins.yml
# @project SlothTool
# @module GitHub Actions / Plugin Release
# @description 当纯 Node 官方插件变更时，按矩阵打包并发布 GitHub Release 资产。
# @logic 1. 监听 loc、gstore 与 todo 插件目录；2. 按矩阵解析插件元数据并执行 npm pack；3. 为不存在的版本 tag 创建 release 并上传 tgz。
# @dependencies GitHub Actions, npm, plugins/loc/package.json, plugins/gstore/package.json, plugins/todo/package.json
# @index_tags workflow, plugin-release, loc, gstore, todo, npm-pack
# @author holic512

name: Release Official Node Plugins

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/loc/**'
      - 'plugins/gstore/**'
      - 'plugins/todo/**'
      - 'test/loc-cli.test.js'
      - 'test/gstore-cli.test.js'
      - 'test/todo-cli.test.js'
      - '.github/workflows/release-plugins.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-node-plugin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - alias: loc
            package_dir: plugins/loc
            tag_prefix: plugin-loc-v
          - alias: gstore
            package_dir: plugins/gstore
            tag_prefix: plugin-gstore-v
          - alias: todo
            package_dir: plugins/todo
            tag_prefix: plugin-todo-v
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Resolve plugin metadata
        id: meta
        run: |
          PACKAGE_DIR="${{ matrix.package_dir }}"
          PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          PACKAGE_TAG="${{ matrix.tag_prefix }}${PACKAGE_VERSION}"

          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_tag=$PACKAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check existing release tag
        id: tag-check
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${{ steps.meta.outputs.package_tag }}" >/dev/null; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install package dependencies
        if: steps.tag-check.outputs.publish == 'true'
        run: |
          cd "${{ steps.meta.outputs.package_dir }}"
          npm install

      - name: Build package if script exists
        if: steps.tag-check.outputs.publish == 'true'
        run: |
          cd "${{ steps.meta.outputs.package_dir }}"
          npm run build --if-present

      - name: Pack plugin source archive
        if: steps.tag-check.outputs.publish == 'true'
        id: pack
        run: |
          cd "${{ steps.meta.outputs.package_dir }}"
          ASSET_NAME=$(npm pack --json | node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8'))[0].filename)")
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Push release tag
        if: steps.tag-check.outputs.publish == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.meta.outputs.package_tag }}"
          git push origin "${{ steps.meta.outputs.package_tag }}"

      - name: Create GitHub release
        if: steps.tag-check.outputs.publish == 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.meta.outputs.package_tag }}
          release_name: ${{ steps.meta.outputs.package_name }} v${{ steps.meta.outputs.package_version }}
          draft: false
          prerelease: false
          body: |
            ## ${{ steps.meta.outputs.package_name }} v${{ steps.meta.outputs.package_version }}

            ### Install with SlothTool
            ```bash
            slothtool install ${{ matrix.alias }}
            ```

            ### Asset
            - Source package generated by `npm pack`
            - Install-time dependencies are resolved locally by SlothTool

      - name: Upload plugin asset
        if: steps.tag-check.outputs.publish == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.meta.outputs.package_dir }}/${{ steps.pack.outputs.asset_name }}
          asset_name: ${{ steps.pack.outputs.asset_name }}
          asset_content_type: application/gzip

      - name: Skip publish for existing version
        if: steps.tag-check.outputs.publish != 'true'
        run: echo "Release tag ${{ steps.meta.outputs.package_tag }} already exists, skipping publish."
